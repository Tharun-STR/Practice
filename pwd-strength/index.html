<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="input-box">

            <input type="password" id="password" placeholder="Enter Password">

            <span id="toggle">👁</span>

                <div class="strength-bar">
                    <div id="strength-bar-fill"></div>
                </div>

            <p id="message">Strength: <span id="strength"></span></p>

            <ul class="rules">
                <li id="length">Minimum 8 characters</li>
                <li id="lower">Lowercase letter</li>
                <li id="upper">Uppercase letter</li>
                <li id="number">Number</li>
                <li id="symbol">Special character</li>
            </ul>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
