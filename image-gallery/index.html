<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image-Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gallery-wrap">
        <img src="back.png" id="backBtn">
        <div class="gallery">
            <div>
                <span> <img src="img1.avif"></span>
                <span> <img src="img2.jpg"></span>
                <span> <img src="img3.jpg"></span>
            </div>
            <div>
                <span> <img src="img4.jpeg"></span>
                <span> <img src="img5.jpg"></span>
                <span> <img src="img6.jpg"></span>
            </div>
        </div>    
        <img src="next.png" id="nextBtn">
    </div>
<script>

        let scrollContainer = document.querySelector(".gallery");
        let backBtn = document.getElementById("backBtn");
        let nextBtn = document.getElementById("nextBtn");
        
        scrollContainer.addEventListener("wheel",(evt)=>{
            evt.preventDefault();
            scrollContainer.scrollLeft += evt.deltaY;
            scrollContainer.style.scrollBehavior="auto";
        });
        
        nextBtn.addEventListener("click",()=>{
            scrollContainer.style.scrollBehavior="smooth";
            scrollContainer.scrollLeft += 900;
        });
        
        backBtn.addEventListener("click",()=>{
            scrollContainer.style.scrollBehavior="smooth";
            scrollContainer.scrollLeft -= 900;
        });
</script>
</body>
</html>
