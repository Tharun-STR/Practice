<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h3>Coming Soon 🚀</h3>

    <h1>Our Brand New <br> Website Is On It's Way</h1>

    <p>Subscribe to get updates when we launch.</p>

    <form name="YOUR_FORM_NAME" class="subscribe-form">
        <input type="email" name="Email" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
    </form>

    <span id="msg"></span>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzoDtIf2UGZKg--7_C5kNQQ51KDvny2cjR_MPsE6XsV8UvjCmoTa9IdrmqJarNVv9rh/exec"

const form = document.forms["YOUR_FORM_NAME"]
const msg = document.getElementById("msg")

form.addEventListener("submit", e => {

    e.preventDefault()

    fetch(scriptURL,{
        method:"POST",
        body:new FormData(form),
        mode:"no-cors"
    })

    msg.innerHTML = "✅ Thank you for subscribing!"

    setTimeout(()=>{
        msg.innerHTML=""
    },5000)

    form.reset()

})

</script>

</body>
</html>
